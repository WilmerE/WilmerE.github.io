<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist de Adoracion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Marcellus&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="player-shell">
      <section class="player-card">
        <p class="eyebrow">HIMNOS EVANGELICOS</p>
        <h1>Playlist de Adoración</h1>
        <p class="subtitle">Reproductor para compartir alabanzas.</p>

        <audio id="audioPlayer" controls preload="metadata" class="audio"></audio>

        <div id="statusMessage" class="status">Cargando canciones...</div>
        <ul id="playlist" class="playlist" aria-label="Lista de canciones"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
